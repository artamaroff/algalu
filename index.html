<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algalu Holding</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
  font-family: Arial, sans-serif;
}

.container {
  width: 100%;
  height: 100vh;
  background-image: url('landing.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  position: relative;
}

/* CONTACTO ARRIBA DERECHA */
.contact {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 14px;
  text-align: right;
}

.contact span {
  display: block;
  font-size: 12px;
  opacity: 0.8;
}

/* MÓVIL */
@media (max-width: 768px) {
  .container {
    background-size: contain;
    background-position: center top;
  }

  .contact {
    top: 10px;
    right: 15px;
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="contact">
    <span>CONTACT US</span>
    algalu@algalu.com
  </div>
</div>

</body>
</html>
</html>
