<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algalu Holding</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
}

.container {
  width: 100%;
  height: 100vh;
  background-image: url('landing.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* MÓVIL */
@media (max-width: 768px) {
  .container {
    height: 100vh;
    background-size: contain; /* evita cortes en móvil */
  }
}
</style>
</head>

<body>
<div class="container"></div>
</body>
</html>
